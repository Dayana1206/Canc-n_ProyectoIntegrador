<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>UTN GolMundial 2026 - Iniciar sesión</title>
</h:head>
<h:body>

    <h:form id="loginForm">
        <p:growl id="mensajes" showDetail="true" />

        <p:panel header="Iniciar sesión - Administrador" style="width:350px; margin:100px auto;">

            <h:panelGrid columns="1" style="width:100%">

                <p:outputLabel for="username" value="Usuario" />
                <p:inputText id="username" value="#{loginBean.username}" required="true"
                             requiredMessage="El usuario es obligatorio" />

                <p:outputLabel for="password" value="Contraseña" />
                <p:password id="password" value="#{loginBean.password}" required="true"
                            requiredMessage="La contraseña es obligatoria" feedback="false" />

                <p:commandButton value="Ingresar" action="#{loginBean.login}"
                                  update="mensajes" ajax="true" style="margin-top:15px" />

            </h:panelGrid>

        </p:panel>
    </h:form>

</h:body>
</html>
