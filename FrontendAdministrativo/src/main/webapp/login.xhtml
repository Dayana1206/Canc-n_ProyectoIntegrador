<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>UTN GolMundial 2026 - Log In</title>
    <h:outputStylesheet library="css" name="estilos.css" />
</h:head>
<h:body class="fondo-cancha">

    <h:form id="loginForm">
        <p:growl id="messages" showDetail="true" />

        <div class="tarjeta-mundial">
            <div class="titulo">⚽ UTN GolMundial 2026</div>

            <h:panelGrid columns="1" style="width:100%">

                <p:outputLabel for="username" value="Username" />
                <p:inputText id="username" value="#{loginBean.username}" required="true"
                             requiredMessage="Username is required" style="width:100%" />

                <p:outputLabel for="password" value="Password" />
                <p:password id="password" value="#{loginBean.password}" required="true"
                            requiredMessage="Password is required" feedback="false" style="width:100%" />

                <div class="boton-dorado" style="margin-top:15px">
                    <p:commandButton value="Log In" action="#{loginBean.login}"
                                      update="messages" ajax="true" style="width:100%" />
                </div>

                <p:commandButton value="Continue as Guest" action="#{loginBean.enterAsGuest}"
                                  styleClass="ui-button-secondary" style="width:100%; margin-top:8px" />

                <h:panelGroup style="text-align:center; margin-top:15px; display:block" styleClass="enlace-claro">
                    <h:outputText value="Don't have an account? " style="color:#555" />
                    <h:link outcome="/register.xhtml" value="Register here" />
                </h:panelGroup>

            </h:panelGrid>
        </div>
    </h:form>

</h:body>
</html>
