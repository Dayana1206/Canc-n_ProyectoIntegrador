<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>

<ui:composition
    template="/templates/template.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets">

    <ui:define name="contenido">

        <h1 class="titulo-pagina">
            🏆 Ranking Mundial
        </h1>

        <div class="ranking-contenedor">

            <ui:repeat value="#{rankingBean.ranking}" var="r" varStatus="st">

                <div class="ranking-card">

                    <div class="ranking-posicion">

                        #{st.index + 1}

                    </div>

                    <div class="ranking-usuario">

                        <h2>

                            <h:panelGroup rendered="#{st.index==0}">
                                🥇
                            </h:panelGroup>

                            <h:panelGroup rendered="#{st.index==1}">
                                🥈
                            </h:panelGroup>

                            <h:panelGroup rendered="#{st.index==2}">
                                🥉
                            </h:panelGroup>

                            Usuario #{r.usuarioId}

                        </h2>

                        <p>

                            ⭐ Aciertos:
                            <strong>#{r.aciertos}</strong>

                        </p>

                    </div>

                    <div class="ranking-saldo">

                        #{r.saldo}

                        <br/>

                        🪙 UTNCoins

                    </div>

                </div>

            </ui:repeat>

        </div>

    </ui:define>

</ui:composition>
