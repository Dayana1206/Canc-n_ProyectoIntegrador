<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>UTN GolMundial 2026 - Home</title>
    <h:outputStylesheet library="css" name="estilos.css" />
</h:head>
<h:body class="fondo-imagen">
    <h:form id="homeForm">
        <div class="tarjeta-mundial" style="width:600px;">

            <div style="text-align:center; margin-bottom:10px;">
                <h:graphicImage library="images" name="balon-mundial.png" style="height:40px;" />
            </div>

            <h:panelGroup rendered="#{loginBean.authenticated}">
                <h2 class="titulo">Bienvenido, #{loginBean.authenticatedUser.fullName}!</h2>
                <p>Usuario: #{loginBean.authenticatedUser.username}</p>
            </h:panelGroup>
            <h:panelGroup rendered="#{loginBean.guest}">
                <h2 class="titulo">Estás navegando como invitado</h2>
                <p>Puedes revisar el torneo, pero no podrás hacer predicciones.
                   <h:link outcome="/register.xhtml" value="Regístrate aquí" /> para participar.</p>
            </h:panelGroup>
            <h:panelGroup rendered="#{!loginBean.authenticated and !loginBean.guest}">
                <h2 class="titulo">Necesitas iniciar sesión primero</h2>
                <h:link outcome="/login.xhtml" value="Go to login" />
            </h:panelGroup>
            <p:separator rendered="#{loginBean.authenticated or loginBean.guest}" />
            <h:panelGrid columns="2" style="width:100%" cellpadding="8" rendered="#{loginBean.authenticated or loginBean.guest}">
                <p:button value="📅 Calendario de Partidos" outcome="/calendar.xhtml" style="width:100%" styleClass="tarjeta-modulo" />
                <p:button value="📊 Clasificación de Grupos" outcome="/standings.xhtml" style="width:100%" styleClass="tarjeta-modulo" />
                <p:button value="🎯 Hacer una Predicción" outcome="/predictions.xhtml" style="width:100%" styleClass="tarjeta-modulo"
                          disabled="#{loginBean.guest}" />
                <p:button value="💰 Mi Billetera" outcome="/wallet.xhtml" style="width:100%" styleClass="tarjeta-modulo"
                          disabled="#{loginBean.guest}" />
                <p:button value="🏆 Ranking" outcome="/ranking.xhtml" style="width:100%" styleClass="tarjeta-modulo" />
                <p:commandButton value="Cerrar Sesión" action="#{loginBean.logout}" style="width:100%" styleClass="tarjeta-modulo" />
            </h:panelGrid>
        </div>
    </h:form>
</h:body>
</html>
